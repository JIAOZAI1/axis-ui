# 发布组件库到 GitHub Packages
#
# 触发方式:
#   1. 在 GitHub 上创建 Release(推荐,对应正式版本)
#   2. 手动触发(workflow_dispatch,用于补发)
#
# 无需配置任何 Secret:GITHUB_TOKEN 由 Actions 自动注入,
# 且 permissions.packages: write 已授予发布权限。
name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          # scope 与 package.json 的 name 作用域保持一致
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
